version: '3.8'
services:
  subscription_db:
    image: postgres:16.3-alpine
    container_name: subscription_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${DATASOURCE_PASSWORD}
    ports:
      - "5438:5432"
    volumes:
      - "subscription_db:/var/lib/postgresql/data"
    networks:
      - taskboard-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
      
  subscription-service:
    container_name: subscription-service
    build:
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: "Host=subscription_db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${DATASOURCE_PASSWORD}"
    depends_on:
      subscription_db:
        condition: service_healthy
    ports:
      - "5108:8080"
    networks:
      - taskboard-net


volumes:
  subscription_db:
    name: subscription_db


networks:
  taskboard-net:
    external: true